spring:
  application:
    name: spring-portfolio-modulith
  security:
    user:
      name: melvstein
      password: admin123
  datasource:
    url: jdbc:postgresql://localhost:5432/portfolio_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate # IMPORTANT when using flyway, set this to validate to avoid conflicts with the database schema
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-disabled: true
  jackson:
    time-zone: Asia/Manila
  kafka:
    bootstrap-servers: localhost:29092
    producer:
      properties:
        spring.json.add.type.headers: true
    consumer:
      auto-offset-reset: earliest
logging:
  level:
    org.flywaydb: INFO
info:
  app:
    name: Portfolio API
    version: 1.0.0
    developer: Melvstein
management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: when-authorized
