spring:
  application:
    name: spring-portfolio-modulith
  datasource:
    url: jdbc:postgresql://localhost:5432/portfolio_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate # IMPORTANT when using flyway, set this to validate to avoid conflicts with the database schema
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-disabled: true
logging:
  level:
    org.flywaydb: INFO
